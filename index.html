  <main class="container main">
    <div class="main-content">
      <div class="character-box">
        <div class="character-name">Super</div>
        <div class="character-avatar">
          <img src="/assets/img/super.png" alt="super">
        </div>
        <div class="character-health">
          <progress class="character-health-bar" value="150" max="150"></progress>
          <p class="character-health-count">
            <span id="health">150</span> / 150
          </p>
        </div>
      </div>
      <div class="table">
        <p class="battle-info">Please pick 1 Attack zone and 2 Defence zones</p>
        <div class="picker-box">
          <div class="attack-zones">
            <p>Attack Zones</p>
            <div class="check-box-wrapper">
              <label class="check-box-label">Head</label>
              <input class="check-box-input" type="radio">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Neck</label>
              <input class="check-box-input" type="radio" >
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Body</label>
              <input class="check-box-input" type="radio">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Belly</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Legs</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
          </div>
          <div class="defence-zones">
            <p> Defence Zones</p>
            <div class="check-box-wrapper">
              <label class="check-box-label">Head</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Neck</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Body</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Belly</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
            <div class="check-box-wrapper">
              <label class="check-box-label">Legs</label>
              <input class="check-box-input" type="radio" readonly="">
            </div>
          </div>
        </div>
        <button>Attack!</button>
      </div>
      <div class="enemy-box ">
        <div class="enemy-name">Regishka</div>
        <div class="enemy-avatar">
          <img src="/assets/img/moana.png" alt="moana">
        </div>
        <div class="enemy-health">
          <progress class="enemy-health-bar" value="150" max="150"></progress>
          <p class="enemy-health-count">
            <span id="health-enemy">150</span> / 150
          </p>
        </div>
      </div>
    </div>
    <div class="battle-content">
      <p class="battle-title">Battle Log</p>
      <div class="battle-logs">
        dsfsdfsf
      </div>
    </div>
  </main>

  </footer>
